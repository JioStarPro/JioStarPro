<!DOCTYPE html>

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #06070d; color: #fff; height: 100vh; overflow: hidden; width: 100vw; display: flex; justify-content: center; align-items: center; }
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }

        /* 全屏高斯模糊背景 */
        .page-bg-blur {
            position: absolute; width: 100%; height: 100%;
            background-color: #0c0d14;
            background-image:
                    radial-gradient(circle at 20% 30%, rgba(255, 153, 51, 0.25) 0%, transparent 60%),
                    radial-gradient(circle at 80% 70%, rgba(19, 136, 8, 0.25) 0%, transparent 60%);
            z-index: 1;
        }

        /* 弹窗核心容器 */
        .modal-box {
            position: relative; z-index: 99;
            background: #111218; border: 1px solid rgba(255,153,51,0.25);
            border-radius: 28px; padding: 40px 24px 30px; width: 88%; max-width: 350px;
            text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            animation: popSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        .modal-logo { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 18px; box-shadow: 0 0 20px rgba(255,153,51,0.3); object-fit: cover; }
        .modal-title { font-size: 23px; font-weight: 900; color: #fff; margin-bottom: 8px; letter-spacing: -0.5px; }
        .modal-desc { font-size: 13.5px; color: #8892b0; margin-bottom: 32px; line-height: 1.5; padding: 0 5px; }

        /* 真实的下载按钮 */
        .modal-download-btn {
            display: inline-flex; justify-content: center; align-items: center; gap: 10px;
            width: 100%; background: linear-gradient(90deg, #FFB347 0%, #FF9933 45%, #138808 100%);
            color: #111; text-decoration: none; padding: 16px 0; border-radius: 35px;
            font-size: 16.5px; font-weight: 900; margin-bottom: 18px;
            box-shadow: 0 12px 30px rgba(255, 153, 51, 0.35);
            transition: transform 0.1s;
        }
        .modal-download-btn:active { transform: scale(0.96); }

        .modal-close-btn {
            background: transparent; border: none; color: #4f5e75; font-size: 13px; font-weight: 700;
            padding: 8px; cursor: pointer; text-decoration: none; display: inline-block;
        }

        @keyframes popSlideIn {
            0% { transform: scale(0.85) translateY(30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
    </style>
</head>
